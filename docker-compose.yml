version: "3.8"

services:
  app:
    build:
      context: .
      args:
        - DATABASE_URL=postgresql://postgres:postgres@openjkn-db:5432/openjkn
        - BETTER_AUTH_URL=https://open-jkn.technosmart.id
        - BETTER_AUTH_SECRET=temp-secret-change-in-production
        - NEXT_PUBLIC_BETTER_AUTH_URL=https://open-jkn.technosmart.id
        - NEXT_PUBLIC_APP_URL=https://open-jkn.technosmart.id
        - RESEND_API_KEY=
        - OPENIMIS_DATABASE_URL=
    # Remove port mapping - Dokploy handles reverse proxying
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@openjkn-db:5432/openjkn
      - BETTER_AUTH_URL=https://open-jkn.technosmart.id
      - BETTER_AUTH_SECRET=temp-secret-change-in-production
      - NEXT_PUBLIC_BETTER_AUTH_URL=https://open-jkn.technosmart.id
      - NEXT_PUBLIC_APP_URL=https://open-jkn.technosmart.id
      - RESEND_API_KEY=
      - OPENIMIS_DATABASE_URL=
    depends_on:
      openjkn-db:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads
    networks:
      - default
      - dokploy-network

  openjkn-db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=openjkn
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  uploads:
  postgres_data:

networks:
  default:
  dokploy-network:
    external: true
